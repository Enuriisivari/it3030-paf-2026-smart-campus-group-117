spring.application.name=smart-campus-api

# Load local .env if present (key=value lines)
# Put a `.env` file in `backend/smart-campus-api/.env`
spring.config.import=optional:file:.env[.properties]

# MongoDB Atlas (override via env MONGODB_URI)
# Example: mongodb+srv://USER:PASSWORD@cluster0.xxxxx.mongodb.net/smart_campus?retryWrites=true&w=majority
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart_campus}

# Google OAuth2 (set env GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET or use application-local.properties)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-key-for-production-min-256-bits}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.qr.hmac-secret=${QR_HMAC_SECRET:change-qr-hmac-secret}
app.upload.dir=${UPLOAD_DIR:uploads}
app.dev-login.enabled=${DEV_LOGIN_ENABLED:true}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

server.port=8080
