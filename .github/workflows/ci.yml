name: CI

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/smart-campus-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: Give permission to mvnw
        run: chmod +x mvnw
      - name: Build & Test (Backend)
        run: ./mvnw clean test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/smart-campus-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install (Frontend)
        run: npm ci
      - name: Build (Frontend)
        run: npm run build